# Per-file RMSE threshold overrides for corpus testing
# Format: filename  threshold
#
# Files not listed here use the default threshold from --threshold flag.
# Thresholds are normalized RMSE values (0.0 = identical, 1.0 = maximum difference).
#
# Examples:
#   file_with_font_diffs.ps    0.10
#   known_halftone_diff.eps    0.15
